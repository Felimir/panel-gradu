version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: panel_gradu_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_NAME:-panel_gradu}
      MARIADB_USER: ${DB_USER:-panel_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-panel_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: panel_gradu_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=${DB_USER:-panel_user}
      - DB_PASSWORD=${DB_PASSWORD:-panel_pass}
      - DB_NAME=${DB_NAME:-panel_gradu}
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: panel_gradu_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: panel_gradu_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  db_data:
